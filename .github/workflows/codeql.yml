name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    uses: dakaneye/hookshot/.github/workflows/codeql.yml@v1
    with:
      languages: '["go"]'
